spring:
  application:
    name: remedify
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.SQLiteDialect
  datasource:
    url: jdbc:h2:mem:remedifydb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console

  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      model: claude-3-5-sonnet-20241022
      max-tokens: 1024
      temperature: 0.3

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    root: INFO
    com.remedify: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

remedify:
  scanning:
    clone-timeout-seconds: 300
    temp-dir: /tmp/remedify-scans
    retention-days: 30
    max-scans-to-keep: 20
  snyk:
    enabled: false
    api-key: ${SNYK_API_KEY:}
    base-url: https://api.snyk.io
  github:
    base-url: https://github.com
    api-url: https://api.github.com
